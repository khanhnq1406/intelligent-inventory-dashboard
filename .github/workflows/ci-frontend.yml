name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "api/openapi.yaml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "api/openapi.yaml"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # TODO: Add `npm test` once test suite is configured
      # Currently package.json has no test script set up
